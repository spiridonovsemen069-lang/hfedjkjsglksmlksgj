<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="flowers">
                <div class="flower flower1">🌸</div>
                <div class="flower flower2">🌷</div>
                <div class="flower flower3">🌹</div>
                <div class="flower flower4">🌺</div>
            </div>
            
            <h1 class="title">С 8 Марта!</h1>
            
            <div class="message">
                <p class="greeting">Дорогие женщины!</p>
                <p class="text">От всей души поздравляем вас с Международным женским днём!<br>
                Желаем вам весеннего настроения, цветов, улыбок и счастья!<br>
                Пусть каждый день дарит только приятные эмоции и радостные события.<br>
                Оставайтесь такими же прекрасными и неповторимыми!</p>
            </div>
            
            <div class="hearts">
                <span class="heart">❤️</span>
                <span class="heart">💖</span>
                <span class="heart">💗</span>
                <span class="heart">💓</span>
            </div>
            
            <button class="surprise-btn" id="surpriseBtn">Нажми для сюрприза</button>
            <div class="surprise-message" id="surpriseMessage"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
